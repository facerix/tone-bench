<!doctype html>

<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>TONEBENCH</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Procedural SFX synthesis tool — design and export game/UI sound effects with the Web Audio API"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffb020" />
    <link rel="canonical" href="https://tonebench.facerix.com/" />
    <meta property="og:title" content="TONEBENCH" />
    <meta
      property="og:description"
      content="Procedural SFX synthesis tool — design and export game/UI sound effects with the Web Audio API"
    />
    <meta property="og:url" content="https://tonebench.facerix.com/" />
    <meta property="og:type" content="website" />
    <meta http-equiv="Content-Language" content="en" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/main.css" type="text/css" charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="modulepreload" href="/index.js" />
  </head>

  <body class="u-fill-height">
    <main>
      <div class="rack" id="rack">
        <div class="panel rack-header">
          <span class="screw screw-tl"></span><span class="screw screw-tr"></span
          ><span class="screw screw-bl"></span><span class="screw screw-br"></span>
          <div class="brand-lockup">
            <img src="/favicon.svg" alt="TONEBENCH logo" />
            <h1>TONE<span>BENCH</span></h1>
          </div>
          <div class="status">
            <div class="led" id="audioLed"></div>
            <span id="audioStatus">CONTEXT SUSPENDED</span>
            <button type="button" id="soundSetsBtn">SOUND SETS</button>
          </div>
        </div>

        <oscilloscope-panel id="scope"></oscilloscope-panel>

        <div class="controls-grid">
          <source-panel></source-panel>
          <envelope-panel></envelope-panel>
          <filter-panel></filter-panel>
          <space-panel></space-panel>
        </div>

        <div class="mutate-row">
          <button class="btn mutate" id="mutateBtn" type="button">&#9860; MUTATE</button>
        </div>

        <div class="rack-footer">
          ALL SYNTHESIS RUNS LOCALLY VIA THE WEB AUDIO API &mdash; NO SAMPLES, NO LIBRARIES
          <span aria-hidden="true">/</span>
          A <a href="/about.html">FACERIX</a> CREATION
        </div>
      </div>
    </main>

    <update-notification></update-notification>
    <dialog class="code-modal" id="codeOutDialog" aria-label="Code out">
      <div class="code-modal-shell">
        <button class="code-modal-close" id="codeOutCloseBtn" type="button">CLOSE</button>
        <code-out-panel id="codeOut"></code-out-panel>
      </div>
    </dialog>
    <dialog class="soundsets-modal" id="soundSetsDialog" aria-label="Sound sets">
      <div class="soundsets-modal-shell">
        <button class="soundsets-modal-close" id="soundSetsCloseBtn" type="button">CLOSE</button>
        <sound-set-drawer></sound-set-drawer>
      </div>
    </dialog>
  </body>
  <script src="/index.js" type="module"></script>
</html>
